<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Sum: 2-Choice Duel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="result-overlay" class="hidden">
        <div id="result-text"></div>
    </div>

    <div id="title-screen">
        <h1>Zero Sum<br><small>2-Choice Duel</small></h1>
        <div class="rule-box">
            <h3>【特殊ルール】</h3>
            <ul>
                <li><strong>1</strong> は <strong>5</strong> に勝てる</li>
                <li><strong>-5</strong> は <strong>-1</strong> に勝てる</li>
                <li>基本は数字が大きい方の勝ち</li>
                <li>勝者は「両者の合計値」をポイントとして得る</li>
            </ul>
        </div>
        <button id="start-btn" onclick="startGame()">GAME START</button>
    </div>

    <div id="game-container" class="hidden">
        <h1>Zero Sum Duel</h1>
        
        <div class="score-board">
            <p>Player: <span id="player-score">0</span></p>
            <p>CPU: <span id="cpu-score">0</span></p>
        </div>

        <div class="battle-field">
            <div id="cpu-selection" class="selection-area">
                <h3>CPUの提示</h3>
                <div class="slots-container">
                    <div class="card-slot enemy-slot" id="cpu-slot-0"></div>
                    <div class="card-slot enemy-slot" id="cpu-slot-1"></div>
                </div>
            </div>
            
            <div class="vs-divider">VS</div>

            <div id="player-selection" class="selection-area">
                <h3>あなたの提示 (2枚選択)</h3>
                <div class="slots-container">
                    <div class="card-slot player-slot" id="player-slot-0"></div>
                    <div class="card-slot player-slot" id="player-slot-1"></div>
                </div>
            </div>
        </div>

        <div id="guide-text">手札からカードを2枚選んでください</div>

        <div id="player-hand" class="hand"></div>

        <button id="battle-btn" disabled onclick="cpuReveal()">2枚を提示する</button>

        <div id="log"></div>
    </div>

    <div id="result-screen" class="hidden">
        <h1>BATTLE RESULT</h1>
        <div class="final-score-box">
            <div class="score-item">
                <span class="label">PLAYER</span>
                <span id="final-player-score" class="value">0</span>
            </div>
            <div class="vs-text">VS</div>
            <div class="score-item">
                <span class="label">CPU</span>
                <span id="final-cpu-score" class="value">0</span>
            </div>
        </div>
        <h2 id="final-comment">勝利！</h2>
        <button class="back-to-title-btn" onclick="backToTitle()">タイトルへ戻る</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
